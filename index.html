<!DOCTYPE html>
<html>
<head>
  <title>Игра Пирамида</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #fff8dc; /* можно выбрать фоновый цвет Египта */
    }
    h1 {
      font-size: 2em;
      margin-bottom: 20px;
    }
    #text {
      font-size: 1.5em;
      margin: 20px 0;
    }
    button {
      font-size: 1.5em;
      padding: 15px 25px;
      margin: 10px;
      border-radius: 10px;
      cursor: pointer;
      background-color: #f4a460; /* песочный цвет */
      border: none;
      color: white;
    }
    button:hover {
      background-color: #e5943b;
    }
    #buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    @media (min-width: 600px) {
      #buttons {
        flex-direction: row;
      }
    }
  </style>
</head>
<body>
  <h1>🏺 Пирамида</h1>
  <div id="text">Нажми "Старт" чтобы начать игру</div>
  <button id="start">Старт</button>
  <div id="buttons"></div>

  <script>
    let chat_id = Date.now(); // простой идентификатор сессии
    document.getElementById('start').onclick = async () => {
      const res = await fetch('/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id})
      });
      const data = await res.json();
      document.getElementById('text').innerText = data.text;
      renderButtons(data.buttons);
    };

    function renderButtons(buttons) {
      const div = document.getElementById('buttons');
      div.innerHTML = '';
      buttons.forEach(b => {
        const btn = document.createElement('button');
        btn.innerText = b;
        btn.onclick = async () => {
          const res = await fetch('/move', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id, choice: b})
          });
          const data = await res.json();
          document.getElementById('text').innerText = data.text;
          if(data.buttons) renderButtons(data.buttons);
        };
        div.appendChild(btn);
      });
    }
  </script>
</body>
</html>
