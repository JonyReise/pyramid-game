<!DOCTYPE html>
<html>
<head>
  <title>Игра Пирамида</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: #fff8dc;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 2.5em;
      margin-top: 20px;
    }

    #text {
      font-size: 1.8em;
      margin: 20px 0;
      line-height: 1.4em;
      min-height: 50px;
    }

    #buttons {
      display: flex;
      flex-direction: row;
      gap: 15px;
      margin-bottom: 20px;
    }

    button {
      font-size: 1.8em;
      padding: 15px 25px;
      border-radius: 12px;
      cursor: pointer;
      border: none;
      background-color: #f4a460;
      color: white;
      min-width: 120px;
      transition: transform 0.2s;
    }

    button:hover {
      background-color: #e5943b;
      transform: scale(1.05);
    }

    #dice {
      font-size: 3em;
      margin: 20px 0;
      min-height: 50px;
    }

    #pyramid {
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      margin-bottom: 20px;
    }

    .pyramid-level {
      width: 60px;
      height: 40px;
      background-color: #d2b48c;
      margin: 2px 0;
      border-radius: 5px;
      transform: translateY(50px);
      opacity: 0;
      animation: rise 0.5s forwards;
    }

    @keyframes rise {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <h1>🏺 Пирамида</h1>
  <div id="text">Нажми "Старт" чтобы начать игру</div>
  <button id="start">Старт</button>
  <div id="dice"></div>
  <div id="buttons"></div>
  <div id="pyramid"></div>

  <script>
    let chat_id = Date.now();
    const startBtn = document.getElementById('start');
    const textDiv = document.getElementById('text');
    const buttonsDiv = document.getElementById('buttons');
    const diceDiv = document.getElementById('dice');
    const pyramidDiv = document.getElementById('pyramid');

    startBtn.onclick = async () => {
      startBtn.style.display = 'none';
      // отправляем на сервер старт
      const res = await fetch('/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id})
      });
      const data = await res.json();
      textDiv.innerText = data.text;
      renderButtons(data.buttons);
    };

    function renderButtons(buttons) {
      buttonsDiv.innerHTML = '';
      buttons.forEach(b => {
        const btn = document.createElement('button');
        btn.innerText = b;
        btn.onclick = () => handleChoice(b);
        buttonsDiv.appendChild(btn);
      });
    }

    async function handleChoice(choice) {
      // анимация броска кубика
      const rollCount = 10;
      for(let i=0;i<rollCount;i++){
        const temp = Math.floor(Math.random()*10)+1;
        diceDiv.innerText = temp;
        await new Promise(r=>setTimeout(r,50 + i*10));
      }

      // отправка на сервер
      const res = await fetch('/move', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id, choice})
      });
      const data = await res.json();

      textDiv.innerText = data.text;
      renderButtons(data.buttons);

      if(data.build_level){
        addPyramidLevel();
      }
    }

    function addPyramidLevel(){
      const level = document.createElement('div');
      level.classList.add('pyramid-level');
      pyramidDiv.appendChild(level);
    }
  </script>
</body>
</html>
