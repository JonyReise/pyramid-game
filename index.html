<!DOCTYPE html>
<html>
<head>
  <title>Игра Пирамида</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: #fff8dc;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    #text {
      font-size: 1.8em;
      margin: 20px 0;
      line-height: 1.4em;
    }

    #buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 90%;
      max-width: 400px;
      margin-top: 10px;
    }

    button {
      font-size: 1.8em;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      border: none;
      background-color: #f4a460;
      color: white;
      width: 100%;
    }

    button:hover {
      background-color: #e5943b;
    }

    #start {
      margin-top: 10px;
      width: 90%;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <h1>🏺 Пирамида</h1>
  <div id="text">Нажми "Старт" чтобы начать игру</div>
  <button id="start">Старт</button>
  <div id="buttons"></div>

  <script>
    let chat_id = Date.now(); // уникальный идентификатор сессии
    const startBtn = document.getElementById('start');
    const textDiv = document.getElementById('text');
    const buttonsDiv = document.getElementById('buttons');

    startBtn.onclick = async () => {
      const res = await fetch('/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id})
      });
      const data = await res.json();
      textDiv.innerText = data.text;
      renderButtons(data.buttons);
    };

    function renderButtons(buttons) {
      buttonsDiv.innerHTML = '';
      buttons.forEach(b => {
        const btn = document.createElement('button');
        btn.innerText = b;
        btn.onclick = async () => {
          const res = await fetch('/move', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id, choice: b})
          });
          const data = await res.json();
          textDiv.innerText = data.text;
          if(data.buttons) renderButtons(data.buttons);
        };
        buttonsDiv.appendChild(btn);
      });
    }
  </script>
</body>
</html>
